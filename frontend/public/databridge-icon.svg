<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4600AF" />
      <stop offset="100%" stop-color="#6B2DC7" />
    </linearGradient>
  </defs>
  
  <!-- Main circle with gradient background -->
  <circle cx="32" cy="32" r="30" fill="url(#logoGradient)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- "DB" Letters in white -->
  <text x="32" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">DB</text>
  
  <!-- Bridge connection elements -->
  <circle cx="16" cy="50" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="48" cy="50" r="2" fill="#ffffff" opacity="0.8"/>
  <line x1="18" y1="50" x2="46" y2="50" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
</svg>
