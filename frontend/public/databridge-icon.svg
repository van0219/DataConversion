<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#000000"/>
  
  <!-- "DB" Letters in red -->
  <text x="32" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#C8102E" text-anchor="middle">DB</text>
  
  <!-- Connecting line underneath -->
  <line x1="16" y1="50" x2="48" y2="50" stroke="#C8102E" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Connection dots -->
  <circle cx="16" cy="50" r="3" fill="#FFFFFF"/>
  <circle cx="48" cy="50" r="3" fill="#FFFFFF"/>
</svg>
